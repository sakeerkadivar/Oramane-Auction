<!DOCTYPE html>
<html>
<head>
  <title>Oramane Luxe Auction</title>

  <style>
    body{
      text-align:center;
      font-family:Arial, sans-serif;
    }
    img, video{
      max-width:90%;
    }
  </style>
</head>

<body>

<h1>Oramane Luxe Auction</h1>
<h2>Infinity Tipai</h2>

<p id="productDescription"></p>

<img id="productImage" width="400">
<br><br>

<video id="productVideo" width="400" controls></video>

<br><br>

<p id="timer"></p>

<p>Current Bid: ₹<span id="currentBid">0</span></p>

<p>Highest Bidder: <span id="highestBidder">No Bid Yet</span></p>

<h3>Bid History</h3>
<div id="bidHistory"></div>

<br>

<input id="name" type="text" placeholder="Your Name">
<br><br>

<input id="mobile" type="tel" placeholder="Mobile Number">
<br><br>

<input id="bidInput" type="number" placeholder="Enter Your Bid">
<br><br>

<button onclick="placeBid()">Place Bid</button>
<button onclick="endAuction()" style="background:red;color:white;">
  End Auction (Admin)
</button>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.5.0/firebase-app.js";
import {
  getFirestore,
  doc,
  getDoc,
  updateDoc,
  onSnapshot,
  collection,
  addDoc,
  serverTimestamp,
  query,
  orderBy
} from "https://www.gstatic.com/firebasejs/12.5.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAo3IRVpwQuHYbe7_MnqCWEO_GRFav2QP8",
  authDomain: "oramane-lux-auction-4e10e.firebaseapp.com",
  projectId: "oramane-lux-auction-4e10e",
  storageBucket: "oramane-lux-auction-4e10e.firebasestorage.app",
  messagingSenderId: "233399631370",
  appId: "1:233399631370:web:c3179128b25b50a0a8e9f3"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let currentBid = 0;
let minIncrement = 0;
const endDate = new Date("2026-07-08T12:00:00");

// 🔒 Anti-Spam storage
let lastBidTime = {};

// TIMER
setInterval(() => {
  const now = new Date();
  const distance = endDate - now;

  if (distance <= 0) {
    document.getElementById("timer").innerText = "⛔ Auction Closed";
    document.querySelector("button").disabled = true;
    return;
  }

  const d = Math.floor(distance / (1000*60*60*24));
  const h = Math.floor((distance % (1000*60*60*24))/(1000*60*60));
  const m = Math.floor((distance % (1000*60*60))/(1000*60));
  const s = Math.floor((distance % (1000*60))/1000);

  document.getElementById("timer").innerText =
    `Auction Ends In: ${d}d ${h}h ${m}m ${s}s`;

}, 1000);


// LOAD DATA
async function loadBid() {

  onSnapshot(doc(db, "Auction", "auction1"), (snap) => {
    if (snap.exists()) {
      currentBid = snap.data().currentBid || 0;

      document.getElementById("currentBid").innerText = currentBid;
      document.getElementById("highestBidder").innerText =
        snap.data().bidderName || "No Bid Yet";
    }
  });

  const productSnap = await getDoc(doc(db, "Products", "product1"));

  if (productSnap.exists()) {
    const p = productSnap.data();
    document.querySelector("h2").innerText = p.name || "";
    document.getElementById("productDescription").innerText = p.description || "";
    document.getElementById("productImage").src = p.imageUrl || "";

    document.getElementById("productVideo").innerHTML =
      `<source src="${p.videoUrl}" type="video/mp4">`;
  }

  const settingSnap = await getDoc(doc(db, "settings", "auction1"));

  if (settingSnap.exists()) {
    minIncrement = settingSnap.data().minIncrement || 0;
  }
}


// 🚀 PLACE BID (ANTI-SPAM ADDED)
window.placeBid = async function () {

  const name = document.getElementById("name").value;
  const mobile = document.getElementById("mobile").value;
  const newBid = parseInt(document.getElementById("bidInput").value);

  if (!name || !mobile) return alert("Enter Name & Mobile");
  if (isNaN(newBid)) return alert("Enter valid bid");

  // 🔒 ANTI-SPAM (30 sec rule per mobile)
  const now = Date.now();
  if (lastBidTime[mobile] && now - lastBidTime[mobile] < 30000) {
    alert("Wait 30 seconds before next bid!");
    return;
  }

  // min increment check
  if (newBid < currentBid + (minIncrement || 0)) {
    alert(`Bid must be at least ₹${minIncrement} higher`);
    return;
  }

  // update spam timer
  lastBidTime[mobile] = now;

  await updateDoc(doc(db, "Auction", "auction1"), {
    currentBid: newBid,
    bidderName: name,
    bidderMobile: mobile
  });

  await addDoc(collection(db, "Auction", "auction1", "bids"), {
    name,
    mobile,
    amount: newBid,
    time: serverTimestamp()
  });

  document.getElementById("currentBid").innerText = newBid;
  document.getElementById("highestBidder").innerText = name;

  alert("Bid Placed Successfully!");
};


// 📜 BID HISTORY
function loadHistory() {

  const q = query(
    collection(db, "Auction", "auction1", "bids"),
    orderBy("time", "desc")
  );

  onSnapshot(q, (snapshot) => {

    let html = "";

    snapshot.forEach((doc) => {
      const d = doc.data();

      html += `
        <div style="border:1px solid #ddd;margin:5px;padding:5px;">
          <b>${d.name}</b> bid ₹${d.amount}
        </div>
      `;
    });

    document.getElementById("bidHistory").innerHTML = html;
  });
}


// 🔴 ADMIN END AUCTION (ONE LINE STYLE)
window.endAuction = async function () {
  await updateDoc(doc(db, "Auction", "auction1"), { status: "closed" });

  document.getElementById("timer").innerText = "⛔ Auction Closed by Admin";
  document.querySelector("button").disabled = true;

  alert("Auction Ended by Admin");
};


// INIT
loadBid();
loadHistory();

</script>

</body>
</html>
