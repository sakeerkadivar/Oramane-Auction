<!DOCTYPE html>
<html>
<head>
  <title>Oramane Luxe Auction PRO</title>

  <style>
    body{
      text-align:center;
      font-family:Arial, sans-serif;
    }
    img,video{max-width:90%;}
    input,button{margin:5px;padding:8px;}
  </style>
</head>

<body>

<h1>Oramane Luxe Auction PRO</h1>
<h2>Infinity Tipai</h2>

<p id="productDescription"></p>

<img id="productImage" width="400">
<br><br>

<video id="productVideo" width="400" controls></video>

<h3 id="timer"></h3>

<h2>₹ <span id="currentBid">0</span></h2>
<p>Highest Bidder: <span id="highestBidder">No Bid Yet</span></p>

<hr>

<h3>Login</h3>
<input id="name" placeholder="Name">
<input id="mobile" placeholder="Mobile">
<br><br>

<h3>Place Bid</h3>
<input id="bidInput" type="number" placeholder="Enter Bid">
<br>

<button onclick="placeBid()">Place Bid</button>
<button onclick="endAuction()" style="background:red;color:white;">
Admin End Auction
</button>

<h3>Bid History</h3>
<div id="bidHistory"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.5.0/firebase-app.js";
import {
  getFirestore,
  doc,
  getDoc,
  updateDoc,
  onSnapshot,
  collection,
  addDoc,
  serverTimestamp,
  setDoc,
  query,
  orderBy
} from "https://www.gstatic.com/firebasejs/12.5.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAo3IRVpwQuHYbe7_MnqCWEO_GRFav2QP8",
  authDomain: "oramane-lux-auction-4e10e.firebaseapp.com",
  projectId: "oramane-lux-auction-4e10e"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let currentBid = 0;
let minIncrement = 0;
let auctionClosed = false;
const endDate = new Date("2026-07-08T12:00:00");

let lastBidTime = {};


// ⏳ TIMER
setInterval(()=>{
  const now = new Date();
  const diff = endDate - now;

  if(diff <= 0 || auctionClosed){
    document.getElementById("timer").innerText = "⛔ Auction Closed";
    document.querySelector("button").disabled = true;
    return;
  }

  let d = Math.floor(diff/86400000);
  let h = Math.floor((diff%86400000)/3600000);
  let m = Math.floor((diff%3600000)/60000);
  let s = Math.floor((diff%60000)/1000);

  document.getElementById("timer").innerText =
    `Ends In: ${d}d ${h}h ${m}m ${s}s`;
},1000);


// 📦 LOAD DATA
async function load(){

  onSnapshot(doc(db,"Auction","auction1"),(snap)=>{
    if(snap.exists()){
      const d = snap.data();

      currentBid = d.currentBid || 0;
      auctionClosed = d.status === "closed";

      document.getElementById("currentBid").innerText = currentBid;
      document.getElementById("highestBidder").innerText = d.bidderName || "No Bid Yet";
    }
  });

  const p = await getDoc(doc(db,"Products","product1"));
  if(p.exists()){
    const d = p.data();
    document.querySelector("h2").innerText = d.name;
    document.getElementById("productDescription").innerText = d.description;
    document.getElementById("productImage").src = d.imageUrl;
    document.getElementById("productVideo").innerHTML =
      `<source src="${d.videoUrl}" type="video/mp4">`;
  }

  const s = await getDoc(doc(db,"settings","auction1"));
  if(s.exists()){
    minIncrement = s.data().minIncrement || 0;
  }

  loadHistory();
}


// 🚀 PLACE BID (ANTI SPAM)
window.placeBid = async function(){

  if(auctionClosed) return alert("Auction Closed");

  const name = document.getElementById("name").value;
  const mobile = document.getElementById("mobile").value;
  const bid = parseInt(document.getElementById("bidInput").value);

  if(!name || !mobile) return alert("Enter Name & Mobile");
  if(isNaN(bid)) return alert("Invalid Bid");

  // 🔒 Anti spam 30 sec
  const now = Date.now();
  if(lastBidTime[mobile] && now - lastBidTime[mobile] < 30000){
    return alert("Wait 30 seconds before next bid");
  }

  if(bid < currentBid + minIncrement){
    return alert("Bid too low");
  }

  lastBidTime[mobile] = now;

  await updateDoc(doc(db,"Auction","auction1"),{
    currentBid: bid,
    bidderName: name,
    bidderMobile: mobile
  });

  await addDoc(collection(db,"Auction","auction1","bids"),{
    name,
    mobile,
    amount: bid,
    time: serverTimestamp()
  });

  alert("Bid Placed!");
};


// 📜 HISTORY
function loadHistory(){

  const q = query(
    collection(db,"Auction","auction1","bids"),
    orderBy("time","desc")
  );

  onSnapshot(q,(snap)=>{
    let html = "";

    snap.forEach(d=>{
      const x = d.data();
      html += `<div>${x.name} bid ₹${x.amount}</div>`;
    });

    document.getElementById("bidHistory").innerHTML = html;
  });
}


// 🔴 ADMIN END AUCTION
window.endAuction = async function(){
  await updateDoc(doc(db,"Auction","auction1"),{
    status:"closed"
  });

  alert("Auction Ended");
};


// INIT
load();

</script>

</body>
</html>
