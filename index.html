<!DOCTYPE html>
<html>
<head>
  <title>Oramane Luxe Auction</title>
</head>
<body>

<h1>Oramane Luxe Auction</h1>
<h2>Infinity Tipai</h2>

<p>Current Bid: ₹<span id="currentBid">0</span></p>

<input id="name" type="text" placeholder="Your Name">
<br><br>

<input id="mobile" type="tel" placeholder="Mobile Number">
<br><br>

<input id="bidInput" type="number" placeholder="Enter Your Bid">
<br><br>

<button onclick="placeBid()">Place Bid</button>

<script>
let currentBid = 0;

function placeBid() {

  let name = document.getElementById("name").value;
  let mobile = document.getElementById("mobile").value;
  let newBid = parseInt(document.getElementById("bidInput").value);

  if(name === "" || mobile === ""){
    alert("Please enter Name and Mobile Number");
    return;
  }

  if(isNaN(newBid)){
    alert("Please enter valid bid");
    return;
  }

  if(newBid > currentBid){
    currentBid = newBid;
    document.getElementById("currentBid").innerText = currentBid;

    alert(
      "Bid Placed Successfully!\n\n" +
      "Name: " + name + "\n" +
      "Mobile: " + mobile + "\n" +
      "Bid: ₹" + newBid
    );

  } else {
    alert("Bid must be higher than current bid");
  }
}
</script>

</body>
</html>
