<!DOCTYPE html><html>
<head>
  <title>Pro Auction System</title>  <style>
    body{
      text-align:center;
      font-family:Arial;
    }
    input,button{margin:5px;padding:8px;}
    img,video{max-width:90%;}
  </style></head><body><h1>🔥 PRO AUCTION</h1><h2 id="productName"></h2><p id="timer"></p><h2>₹ <span id="currentBid">0</span></h2>
<p>Winner: <span id="winner">---</span></p><hr><h3>OTP LOGIN</h3>
<input id="phone" placeholder="+91xxxxxxxxxx">
<div id="recaptcha-container"></div>
<button onclick="sendOTP()">Send OTP</button><input id="otp" placeholder="Enter OTP">
<button onclick="verifyOTP()">Verify</button><hr><h3>Place Bid</h3>
<input id="name" placeholder="Name">
<input id="bid" type="number" placeholder="Enter Bid">
<br>
<button onclick="placeBid()">Bid Now</button><hr><h3>Payment</h3>
<button onclick="payUPI()">Pay via UPI</button><hr><button onclick="sendWhatsApp()">Share on WhatsApp</button>

<div id="popup" style="display:none;position:fixed;top:30%;left:20%;right:20%;background:#fff;border:2px solid #000;padding:20px;">
  <h2>🏆 Winner</h2>
  <p id="winText"></p>
  <button onclick="document.getElementById('popup').style.display='none'">Close</button>
</div><script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.5.0/firebase-app.js";
import {
  getFirestore,
  doc,
  getDoc,
  updateDoc,
  onSnapshot,
  addDoc,
  collection,
  serverTimestamp
} from "https://www.gstatic.com/firebasejs/12.5.0/firebase-firestore.js";

import {
  getAuth,
  RecaptchaVerifier,
  signInWithPhoneNumber
} from "https://www.gstatic.com/firebasejs/12.5.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_DOMAIN",
  projectId: "YOUR_PROJECT"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

let user = null;
let currentBid = 0;
let lastTime = 0;

window.sendOTP = async function(){

  window.recaptchaVerifier = new RecaptchaVerifier(auth,'recaptcha-container',{});

  const phone = document.getElementById("phone").value;

  window.confirmationResult = await signInWithPhoneNumber(
    auth,
    phone,
    window.recaptchaVerifier
  );

  alert("OTP Sent");
};

window.verifyOTP = async function(){
  const otp = document.getElementById("otp").value;

  const result = await window.confirmationResult.confirm(otp);
  user = result.user;

  alert("Login Success");
};

function load(){

  onSnapshot(doc(db,"Auction","auction1"),(snap)=>{
    const d = snap.data();
    currentBid = d.currentBid || 0;

    document.getElementById("currentBid").innerText = currentBid;
    document.getElementById("winner").innerText = d.bidderName || "---";

    if(d.status === "closed"){
      showWinner(d.bidderName, d.currentBid);
    }
  });
}

window.placeBid = async function(){

  if(!user) return alert("Login first");

  const name = document.getElementById("name").value;
  const bid = parseInt(document.getElementById("bid").value);

  if(bid <= currentBid) return alert("Higher bid needed");

  if(Date.now() - lastTime < 20000){
    return alert("Wait 20 sec");
  }

  lastTime = Date.now();

  await updateDoc(doc(db,"Auction","auction1"),{
    currentBid: bid,
    bidderName: name
  });

  await addDoc(collection(db,"Auction","auction1","bids"),{
    name,
    amount: bid,
    time: serverTimestamp()
  });

  alert("Bid placed");
};

window.payUPI = function(){
  const upiLink = "upi://pay?pa=yourupi@upi&pn=Auction&am="+currentBid+"&cu=INR";
  window.location.href = upiLink;
};

window.sendWhatsApp = function(){
  const msg = `🔥 Auction Update\nCurrent Bid: ₹${currentBid}`;
  window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`);
};

function showWinner(name, amount){
  document.getElementById("popup").style.display = "block";
  document.getElementById("winText").innerText =
    `${name} won at ₹${amount}`;
}

load();

</script></body>
</html>
